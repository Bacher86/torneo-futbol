<!DOCTYPE html>
<html>
<head>
    <title>Admin Fútbol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 15px; color: #000; background: #fff; font-size: 14px; }
        h1 { font-size: 20px; border-bottom: 2px solid #000; }
        .jugador-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .nombre-jugador { font-size: 16px; font-weight: bold; margin-left: 8px; }
        button { padding: 4px 8px; cursor: pointer; background: #f0f0f0; border: 1px solid #000; }
        input[type="text"] { padding: 5px; width: 150px; border: 1px solid #000; }
        .seccion-botones { position: sticky; bottom: 0; background: #fff; padding: 10px 0; border-top: 2px solid #000; }
        details { margin-top: 5px; font-size: 12px; color: #666; }
        input[type="checkbox"] { transform: scale(1.2); }
    </style>
</head>
<body>
    <h1>Panel de Carga</h1>
    <strong>Nuevo:</strong>
    <input type="text" id="nombreInput" placeholder="Nombre...">
    <button onclick="agregar()">Anotar</button>
    <hr>
    <h3>Pasar Lista (A-Z)</h3>
    <div id="listaContenedor">Cargando...</div>
    <div id="seccionCarga" class="seccion-botones" style="display:none;">
        <button onclick="cargarResultado(3)">GANARON (+3)</button>
        <button onclick="cargarResultado(1)">EMPATARON (+1)</button>
        <button onclick="cargarResultado(0)">PERDIERON (0)</button>
    </div>
    <script>
        function dibujar() {
            const cont = document.getElementById('listaContenedor');
            let datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
            if(datos.length > 0) document.getElementById('seccionCarga').style.display = 'block';
            
            // ORDENAR ALFABÉTICAMENTE
            datos.sort((a, b) => a.nombre.localeCompare(b.nombre));
            
            cont.innerHTML = "";
            datos.forEach((j, i) => {
                cont.innerHTML += `
                <div class="jugador-item">
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" class="jugador-check" value="${j.nombre}">
                        <span class="nombre-jugador">${j.nombre}</span>
                    </label>
                    <div style="margin: 5px 0 0 25px;">
                        Goles: <b>${j.goles}</b> 
                        <button onclick="editar('${j.nombre}','goles',${j.goles+1})">+</button> 
                        <button onclick="editar('${j.nombre}','goles',${j.goles-1})">-</button>
                    </div>
                    <details style="margin-left: 25px;">
                        <summary>Editar manual</summary>
                        Pts: <input type="number" value="${j.puntos}" style="width:40px" onchange="editar('${j.nombre}','puntos',parseInt(this.value))">
                        PJ: <input type="number" value="${j.pj}" style="width:40px" onchange="editar('${j.nombre}','pj',parseInt(this.value))">
                        <button onclick="eliminarJugador('${j.nombre}')" style="color:red; border-color:red; font-size:10px;">Borrar</button>
                    </details>
                </div>`;
            });
        }

        function agregar() {
            const n = document.getElementById('nombreInput').value.trim();
            if(!n) return;
            let d = JSON.parse(localStorage.getItem('futbolDB')) || [];
            d.push({ nombre: n, puntos: 0, pj: 0, goles: 0 });
            localStorage.setItem('futbolDB', JSON.stringify(d));
            document.getElementById('nombreInput').value = "";
            dibujar();
        }

        function editar(nombre, campo, valor) {
            let d = JSON.parse(localStorage.getItem('futbolDB'));
            let idx = d.findIndex(j => j.nombre === nombre);
            d[idx][campo] = valor;
            localStorage.setItem('futbolDB', JSON.stringify(d));
            dibujar();
        }

        function eliminarJugador(nombre) {
