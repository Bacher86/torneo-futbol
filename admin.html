<!DOCTYPE html>
<html>
<head>
    <title>Admin Fútbol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; color: #000; background: #fff; line-height: 1.5; }
        h1, h3 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        .jugador-item { border-bottom: 1px solid #ccc; padding: 15px 0; }
        .nombre-jugador { font-size: 18px; font-weight: bold; display: block; margin-bottom: 5px; }
        button { padding: 8px 12px; cursor: pointer; margin: 2px; }
        input[type="text"], input[type="number"] { padding: 8px; border: 1px solid #000; }
        .seccion-flotante { position: sticky; bottom: 0; background: #eee; padding: 15px; border-top: 2px solid #000; margin-top: 20px; }
        details { margin-top: 5px; color: #555; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Panel de Carga</h1>

    <p><strong>1. Nuevo Jugador:</strong></p>
    <input type="text" id="nombreInput" placeholder="Nombre completo">
    <button onclick="agregar()">Registrar</button>

    <hr>

    <h3>Lista de Jugadores</h3>
    <div id="listaContenedor">Cargando...</div>

    <div id="seccionCarga" class="seccion-flotante" style="display:none;">
        <strong>2. ¿Cómo salió el grupo marcado?</strong><br>
        <button onclick="cargarResultado(3)">GANARON (+3 pts)</button>
        <button onclick="cargarResultado(1)">EMPATARON (+1 pt)</button>
        <button onclick="cargarResultado(0)">PERDIERON (0 pts)</button>
    </div>

    <br>
    <button onclick="window.location.href='index.html'">VER TABLA DE POSICIONES</button>
    <button onclick="borrarDB()" style="color:red; border:none; background:none; text-decoration:underline;">Borrar todo el torneo</button>

    <script>
        function dibujar() {
            const cont = document.getElementById('listaContenedor');
            const datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
            if(datos.length > 0) document.getElementById('seccionCarga').style.display = 'block';
            
            cont.innerHTML = "";
            datos.forEach((j, i) => {
                cont.innerHTML += `
                <div class="jugador-item">
                    <label>
                        <input type="checkbox" class="jugador-check" value="${i}">
                        <span class="nombre-jugador">${j.nombre}</span>
                    </label>
                    <span>Goles: <b>${j.goles}</b> <button onclick="editar(${i},'goles',${j.goles+1})">+</button> <button onclick="editar(${i},'goles',${j.goles-1})">-</button></span>
                    
                    <details>
                        <summary>Corregir Pts/PJ/Nombre</summary>
                        Nombre: <input type="text" value="${j.nombre}" onchange="editar(${i},'nombre',this.value)"><br>
                        Pts: <input type="number" value="${j.puntos}" style="width:50px" onchange="editar(${i},'puntos',parseInt(this.value))">
                        PJ: <input type="number" value="${j.pj}" style="width:50px" onchange="editar(${i},'pj',parseInt(this.value))">
                        <button onclick="eliminarJugador(${i})" style="color:red">Eliminar</button>
                    </details>
                </div>`;
            });
        }

        function agregar() {
            const n = document.getElementById('nombreInput').value;
            if(!n) return;
            let d = JSON.parse(localStorage.getItem('futbolDB')) || [];
            d.push({ nombre: n, puntos: 0, pj: 0, goles: 0 });
            localStorage.setItem('futbolDB', JSON.stringify(d));
            document.getElementById('nombreInput').value = "";
            dibujar();
        }

        function editar(idx, campo, valor) {
            let d = JSON.parse(localStorage.getItem('futbolDB'));
            d[idx][campo] = valor;
            localStorage.setItem('futbolDB', JSON.stringify(d));
            dibujar();
        }

        function eliminarJugador(idx) {
            if(confirm("¿Eliminar?")) {
                let d = JSON.parse(localStorage.getItem('futbolDB'));
                d.splice(idx, 1);
                localStorage.setItem('futbolDB', JSON.stringify(d));
                dibujar();
            }
        }

        function cargarResultado(pts) {
            let d = JSON.parse(localStorage.getItem('futbolDB'));
            const checks = document.querySelectorAll('.jugador-check:checked');
            if(checks.length === 0) return alert("Marcá quiénes jugaron");
            checks.forEach(c => {
                d[c.value].puntos += pts;
                d[c.value].pj += 1;
            });
            localStorage.setItem('futbolDB', JSON.stringify(d));
            location.reload();
        }

        function borrarDB() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
        dibujar();
    </script>
</body>
</html>
