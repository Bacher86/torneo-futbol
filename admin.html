<!DOCTYPE html>
<html>
<head>
    <title>Cargar Datos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>Panel de Control</h1>

    <section>
        <input type="text" id="nombreInput" placeholder="Nombre del jugador...">
        <button onclick="agregar()">+ Registrar Jugador</button>
    </section>

    <hr>

    <h3>Cargar resultados del día</h3>
    <div id="listaContenedor"></div>

    <br>
    <button onclick="window.location.href='index.html'">Ver Tabla de Posiciones</button>
    <button onclick="borrarTodo()" style="background:#a00; color:white;">Reiniciar Torneo</button>

    <script>
        function agregar() {
            const nombre = document.getElementById('nombreInput').value;
            if(!nombre) return;
            let datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
            datos.push({ nombre: nombre, puntos: 0, pj: 0, goles: 0 });
            localStorage.setItem('futbolDB', JSON.stringify(datos));
            document.getElementById('nombreInput').value = "";
            dibujar();
        }

        function modificar(index, campo, valor) {
            let datos = JSON.parse(localStorage.getItem('futbolDB'));
            datos[index][campo] += valor;
            localStorage.setItem('futbolDB', JSON.stringify(datos));
            dibujar();
        }

        function borrarTodo() {
            if(confirm("¿Borrar todos los jugadores y puntos?")) {
                localStorage.removeItem('futbolDB');
                dibujar();
            }
        }

        function dibujar() {
            const cont = document.getElementById('listaContenedor');
            const datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
            cont.innerHTML = "";
            datos.forEach((j, i) => {
                cont.innerHTML += `
                <div style="border: 1px solid #444; padding: 10px; margin-bottom: 5px; border-radius: 5px;">
                    <strong>${j.nombre}</strong><br>
                    Pts: ${j.puntos} <button onclick="modificar(${i},'puntos',3)">+3</button> <button onclick="modificar(${i},'puntos',1)">+1</button> | 
                    Goles: ${j.goles} <button onclick="modificar(${i},'goles',1)">+</button> | 
                    PJ: ${j.pj} <button onclick="modificar(${i},'pj',1)">+</button>
                </div>`;
            });
        }
        dibujar();
    </script>
</body>
</html>
