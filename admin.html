<!DOCTYPE html>
<html>
<head>
    <title>Admin Torneo - Edición</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        .jugador-card { background: #222; border: 1px solid #444; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .fila-superior { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .controles-edicion { display: flex; gap: 5px; flex-wrap: wrap; background: #333; padding: 10px; border-radius: 5px; margin-top: 10px; }
        input[type="checkbox"] { transform: scale(1.3); }
        .btn-edit { background: #555; font-size: 12px; padding: 2px 8px; }
        .marcado { border-color: #00ff00; background: #1a2e1a; }
    </style>
</head>
<body>
    <h1>⚙️ Administrar Torneo</h1>

    <details>
        <summary>➕ Registrar Nuevo Jugador</summary>
        <input type="text" id="nombreInput" placeholder="Nombre y Apellido">
        <button onclick="agregar()">Registrar</button>
    </details>

    <hr>

    <h3>Paso 1: Seleccioná quiénes jugaron hoy</h3>
    <div id="listaContenedor">Cargando...</div>

    <div id="seccionCarga" style="display:none; background: #222; padding: 15px; position: sticky; bottom: 0; border-top: 2px solid #444;">
        <h4>Paso 2: ¿Cómo salió este grupo?</h4>
        <button onclick="cargarResultado(3)" style="background: #28a745;">Ganaron (+3 pts)</button>
        <button onclick="cargarResultado(1)" style="background: #ffc107; color: black;">Empataron (+1 pt)</button>
        <button onclick="cargarResultado(0)" style="background: #6c757d;">Perdieron (0 pts)</button>
    </div>

    <br>
    <button onclick="window.location.href='index.html'">🏆 Ver Tabla de Posiciones</button>
    <button onclick="borrarDB()" style="background: #a00;">Borrar Todo</button>

    <script>
        function dibujar() {
            const cont = document.getElementById('listaContenedor');
            const datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
            if(datos.length > 0) document.getElementById('seccionCarga').style.display = 'block';
            
            cont.innerHTML = "";
            datos.forEach((j, i) => {
                cont.innerHTML += `
                <div class="jugador-card" id="card-${i}">
                    <div class="fila-superior">
                        <label style="display:flex; align-items:center; cursor:pointer; gap:10px;">
                            <input type="checkbox" class="jugador-check" value="${i}" onchange="document.getElementById('card-${i}').classList.toggle('marcado')">
                            <strong>${j.nombre}</strong>
                        </label>
                        <span>⚽ ${j.goles} | Pts: ${j.puntos} | PJ: ${j.pj}</span>
                    </div>
                    
                    <details>
                        <summary class="btn-edit">✏️ Editar datos de ${j.nombre}</summary>
                        <div class="controles-edicion">
                            <label>Nombre: <input type="text" value="${j.nombre}" onchange="editar(${i}, 'nombre', this.value)"></label>
                            <label>Goles: <button onclick="editar(${i}, 'goles', ${j.goles - 1})">-</button> ${j.goles} <button onclick="editar(${i}, 'goles', ${j.goles + 1})">+</button></label>
                            <label>Puntos: <input type="number" style="width:60px" value="${j.puntos}" onchange="editar(${i}, 'puntos', parseInt(this.value))"></label>
                            <label>PJ: <input type="number" style="width:60px" value="${j.pj}" onchange="editar(${i}, 'pj', parseInt(this.value))"></label>
                            <button onclick="eliminarJugador(${i})" style="background:red; padding:2px 5px;">Eliminar Jugador</button>
                        </div>
                    </details>
                </div>`;
            });
        }

        function agregar() {
            const nombre = document.getElementById('nombreInput').value;
            if(!nombre) return;
            let datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
            datos.push({ nombre: nombre, puntos: 0, pj: 0, goles: 0 });
            localStorage.setItem('futbolDB', JSON.stringify(datos));
            document.getElementById('nombreInput').value = "";
            dibujar();
        }

        function editar(index, campo, valor) {
            let datos = JSON.parse(localStorage.getItem('futbolDB'));
            datos[index][campo] = valor;
            localStorage.setItem('futbolDB', JSON.stringify(datos));
            dibujar();
        }

        function eliminarJugador(index) {
            if(confirm("¿Seguro querés eliminar a este jugador?")) {
                let datos = JSON.parse(localStorage.getItem('futbolDB'));
                datos.splice(index, 1);
                localStorage.setItem('futbolDB', JSON.stringify(datos));
                dibujar();
            }
        }

        function cargarResultado(puntosAFavor) {
            let datos = JSON.parse(localStorage.getItem('futbolDB'));
            const marcados = document.querySelectorAll('.jugador-check:checked');
            if(marcados.length === 0) return alert("Marcá quiénes jugaron hoy");

            marcados.forEach(check => {
                const idx = check.value;
                datos[idx].puntos += puntosAFavor;
                datos[idx].pj += 1;
            });

            localStorage.setItem('futbolDB', JSON.stringify(datos));
            alert("¡Cargado!");
            location.reload();
        }

        function borrarDB() { if(confirm("¿Borrar todo el torneo?")) { localStorage.clear(); location.reload(); } }
        dibujar();
    </script>
</body>
</html>
