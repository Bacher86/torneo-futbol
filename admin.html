<!DOCTYPE html>
<html>
<head>
    <title>Carga Rápida Fútbol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>Cargar Jugadores</h1>

    <div style="background: #222; padding: 15px; border-radius: 10px;">
        <input type="text" id="nuevoNombre" placeholder="Nombre del jugador...">
        <button onclick="agregarJugador()">+ Agregar a la lista</button>
    </div>

    <hr>

    <h3>Lista de Jugadores</h3>
    <div id="lista"></div>

    <br>
    <button onclick="borrarTodo()" style="background: #a00;">Borrar toda la tabla</button>
    <br>
    <a href="index.html">⬅ Volver a la Tabla General</a>

    <script>
        // Función para agregar un jugador nuevo
        function agregarJugador() {
            const nombre = document.getElementById('nuevoNombre').value;
            if (!nombre) return;

            let jugadores = JSON.parse(localStorage.getItem('tablaFutbol')) || [];
            
            // Creamos al jugador con todo en 0
            jugadores.push({ nombre: nombre, puntos: 0, pj: 0, goles: 0 });
            
            localStorage.setItem('tablaFutbol', JSON.stringify(jugadores));
            document.getElementById('nuevoNombre').value = "";
            renderizar();
        }

        // Función para sumar puntos/goles
        function sumar(index, tipo) {
            let jugadores = JSON.parse(localStorage.getItem('tablaFutbol'));
            
            if (tipo === 'puntos') jugadores[index].puntos += 1;
            if (tipo === 'goles') jugadores[index].goles += 1;
            if (tipo === 'pj') jugadores[index].pj += 1;

            localStorage.setItem('tablaFutbol', JSON.stringify(jugadores));
            renderizar();
        }

        // Función para mostrar la lista en pantalla
        function renderizar() {
            const listaDiv = document.getElementById('lista');
            const jugadores = JSON.parse(localStorage.getItem('tablaFutbol')) || [];
            listaDiv.innerHTML = "";

            jugadores.forEach((j, index) => {
                listaDiv.innerHTML += `
                    <div style="border-bottom: 1px solid #444; padding: 10px 0;">
                        <strong>${j.nombre}</strong> <br>
                        Puntos: ${j.puntos} <button onclick="sumar(${index}, 'puntos')">+</button> | 
                        Goles: ${j.goles} <button onclick="sumar(${index}, 'goles')">+</button> | 
                        PJ: ${j.pj} <button onclick="sumar(${index}, 'pj')">+</button>
                    </div>
                `;
            });
        }

        function borrarTodo() {
            if(confirm("¿Seguro querés borrar a todos?")) {
                localStorage.removeItem('tablaFutbol');
                renderizar();
            }
        }

        renderizar(); // Carga la lista al abrir
    </script>
</body>
</html>
