<!DOCTYPE html>
<html>
<head>
    <title>Carga de Datos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>Cargar Jugador</h1>
    <form id="futbolForm">
        <input type="text" id="nombre" placeholder="Nombre y Apellido" required>
        <input type="number" id="puntos" placeholder="Puntos" required>
        <input type="number" id="pj" placeholder="Partidos Jugados" required>
        <input type="number" id="goles" placeholder="Goles" required>
        <button type="submit">Guardar Jugador</button>
    </form>
    <a href="index.html">Ver Tabla de Posiciones</a>

    <script src="script.js"></script>
</body>
</html>
