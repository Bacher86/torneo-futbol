<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Fútbol</title>
    <style>
        body { font-family: sans-serif; background: white; color: black; padding: 15px; font-size: 15px; }
        .jugador { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; align-items: center; justify-content: space-between; }
        .info { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .goles-cont { display: flex; align-items: center; gap: 5px; }
        button { padding: 6px 10px; border: 1px solid #000; background: #f0f0f0; cursor: pointer; }
        input[type="text"] { padding: 8px; width: 60%; border: 1px solid #000; margin-bottom: 15px; }
        .footer { position: sticky; bottom: 0; background: white; border-top: 2px solid black; padding: 15px 0; margin-top: 20px; }
        .btn-res { width: 32%; font-size: 12px; font-weight: bold; }
        input[type="checkbox"] { transform: scale(1.4); }
    </style>
</head>
<body>
    <strong>+ Nuevo Jugador:</strong><br>
    <input type="text" id="n" placeholder="Nombre...">
    <button onclick="add()">Anotar</button>

    <div id="lista"></div>

    <div class="footer">
        <strong>¿Cómo salió el grupo marcado?</strong><br><br>
        <button class="btn-res" onclick="res(3)" style="background:#d4edda">GANÓ (+3)</button>
        <button class="btn-res" onclick="res(1)" style="background:#fff3cd">EMPATE (+1)</button>
        <button class="btn-res" onclick="res(0)" style="background:#f8d7da">PERDIÓ (0)</button>
        <br><br>
        <button onclick="window.location.href='index.html'" style="width:100%">VER TABLA POSICIONES</button>
    </div>

    <script>
        function dib() {
            let d = JSON.parse(localStorage.getItem('futbolDB')) || [];
            d.sort((a, b) => a.nombre.localeCompare(b.nombre));
            const div = document.getElementById('lista');
            div.innerHTML = d.length ? "" : "<p>No hay jugadores</p>";
            d.forEach(j => {
                div.innerHTML += `
                <div class="jugador">
                    <div class="info">
                        <input type="checkbox" class="ck" value="${j.nombre}">
                        <span><b>${j.nombre}</b></span>
                    </div>
                    <div class="goles-cont">
                        <span>⚽ ${j.goles}</span>
                        <button onclick="ed('${j.nombre}','goles',${j.goles+1})">+</button>
                        <button onclick="ed('${j.nombre}','goles',${j.goles-1})">-</button>
                    </div>
                </div>`;
            });
        }
        function add() {
            let val = document.getElementById('n').value.trim();
            if(!val) return;
            let d = JSON.parse(localStorage.getItem('futbolDB')) || [];
            d.push({nombre:val, puntos:0, pj:0, goles:0});
            localStorage.setItem('futbolDB', JSON.stringify(d));
            document.getElementById('n').value = "";
            dib();
        }
        function ed(n, c, v) {
            let d = JSON.parse(localStorage.getItem('futbolDB'));
            let i = d.findIndex(x => x.nombre === n);
            d[i][c] = v;
            localStorage.setItem('futbolDB', JSON.stringify(d));
            dib();
        }
        function res(p) {
            let d = JSON.parse(localStorage.getItem('futbolDB'));
            let checks = document.querySelectorAll('.ck:checked');
            if(!checks.length) return alert("Marcá quiénes jugaron");
            checks.forEach(c => {
                let i = d.findIndex(x => x.nombre === c.value);
                d[i].puntos += p; d[i].pj += 1;
            });
            localStorage.setItem('futbolDB', JSON.stringify(d));
            alert("¡Cargado!");
            location.reload();
        }
        dib();
    </script>
</body>
</html>
