<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Posiciones</title>
    <style>
        body { font-family: sans-serif; background: white; color: black; padding: 10px; }
        h2 { text-align: center; font-size: 1.2rem; border-bottom: 2px solid #000; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px 4px; text-align: center; }
        th { background: #f4f4f4; font-size: 11px; }
        td:first-child { text-align: left; font-weight: bold; width: 45%; padding-left: 8px; }
        tr:nth-child(even) { background: #fafafa; }
        .pts { font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>
    <h2>🏆 POSICIONES</h2>
    <table>
        <thead>
            <tr>
                <th>JUGADOR</th>
                <th>PTS</th>
                <th>PJ</th>
                <th>GOL</th>
            </tr>
        </thead>
        <tbody id="t"></tbody>
    </table>
    <script>
        const d = JSON.parse(localStorage.getItem('futbolDB')) || [];
        d.sort((a, b) => b.puntos - a.puntos || b.goles - a.goles || a.pj - b.pj);
        const cuerpo = document.getElementById('t');
        if(!d.length) cuerpo.innerHTML = "<tr><td colspan='4'>Sin datos</td></tr>";
        d.forEach(j => {
            cuerpo.innerHTML += `<tr>
                <td>${j.nombre}</td>
                <td class="pts">${j.puntos}</td>
                <td>${j.pj}</td>
                <td>${j.goles}</td>
            </tr>`;
        });
    </script>
</body>
</html>
