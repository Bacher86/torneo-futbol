<!DOCTYPE html>
<html>
<head>
    <title>Tabla de Posiciones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>🏆 Tabla de Posiciones</h1>
    <table>
        <thead>
            <tr>
                <th>Jugador</th>
                <th>Pts</th>
                <th>PJ</th>
                <th>Goles</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
    <br>


    <script>
        const datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
        // Ordenar: primero por puntos, luego por goles
        datos.sort((a, b) => b.puntos - a.puntos || b.goles - a.goles);

        const tabla = document.getElementById('cuerpoTabla');
        if(datos.length === 0) {
            tabla.innerHTML = "<tr><td colspan='4'>No hay jugadores cargados.</td></tr>";
        } else {
            datos.forEach(j => {
                tabla.innerHTML += `<tr>
                    <td>${j.nombre}</td>
                    <td><b>${j.puntos}</b></td>
                    <td>${j.pj}</td>
                    <td>${j.goles}</td>
                </tr>`;
            });
        }
    </script>
</body>
</html>
