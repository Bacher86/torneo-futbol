<!DOCTYPE html>
<html>
<head>
    <title>Posiciones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 10px; background: #fff; color: #000; font-size: 14px; }
        h1 { text-align: center; font-size: 18px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 6px 4px; text-align: center; }
        th { background: #eee; font-size: 12px; }
        td:first-child { text-align: left; font-weight: bold; width: 40%; }
        tr:nth-child(even) { background: #f9f9f9; }
        b { color: #d32f2f; } /* Puntos en rojo oscuro para resaltar */
    </style>
</head>
<body>
    <h1>🏆 POSICIONES</h1>
    <table>
        <thead>
            <tr>
                <th>JUGADOR</th>
                <th>PTS</th>
                <th>PJ</th>
                <th>GOL</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
    <script>
        const datos = JSON.parse(localStorage.getItem('futbolDB')) || [];
        datos.sort((a, b) => b.puntos - a.puntos || b.goles - a.goles || a.pj - b.pj);
        const tabla = document.getElementById('cuerpoTabla');
        datos.forEach(j => {
            tabla.innerHTML += `<tr>
                <td>${j.nombre}</td>
                <td><b>${j.puntos}</b></td>
                <td>${j.pj}</td>
                <td>${j.goles}</td>
            </tr>`;
        });
    </script>
</body>
</html>
